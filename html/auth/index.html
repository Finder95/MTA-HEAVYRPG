<!doctype html>
<html lang="pl">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HeavyRPG Auth</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <main class="shell">
        <section class="card" id="authCard">
            <header class="panel-head">
                <div>
                    <span class="eyebrow">Los Santos Roleplay</span>
                    <h1 id="serverName">HeavyRPG</h1>
                </div>
                <div class="mark">HRP</div>
            </header>

            <div class="tabs">
                <button class="tab active" data-tab="login">Logowanie</button>
                <button class="tab" data-tab="register">Rejestracja</button>
            </div>

            <div id="status" class="status muted">Laczenie z serwerem...</div>

            <form class="form active" id="loginForm">
                <label>
                    Login
                    <input name="identifier" autocomplete="username" placeholder="np. HeavyPlayer" />
                </label>

                <label>
                    Haslo
                    <input name="password" type="password" autocomplete="current-password" placeholder="Twoje haslo" />
                </label>

                <button type="submit" class="primary">Wejdz do miasta</button>
            </form>

            <form class="form" id="registerForm">
                <label>
                    Login
                    <input name="username" autocomplete="username" placeholder="3-24 znaki" />
                </label>

                <label>
                    Haslo
                    <input name="password" type="password" autocomplete="new-password" placeholder="Minimum 8 znakow" />
                </label>

                <div class="password-meter">
                    <div id="meterBar"></div>
                </div>
                <small id="passwordHint">Haslo musi miec minimum 8 znakow.</small>

                <button type="submit" class="primary">Stworz konto</button>
            </form>

            <footer class="panel-foot">
                <span>Secure account core</span>
                <span>SQLite save</span>
            </footer>
        </section>
    </main>

    <script src="app.js?v=20260619-2"></script>
</body>
</html>
